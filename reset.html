<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4A90D9">
    <title>重置缓存中</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #eef6ff 0%, #d7e8ff 100%);
            color: #17324d;
            padding: 24px;
        }
        .card {
            width: min(100%, 420px);
            background: rgba(255, 255, 255, 0.92);
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 18px 40px rgba(34, 76, 132, 0.14);
            text-align: center;
        }
        h1 { font-size: 22px; margin-bottom: 12px; }
        p { font-size: 14px; line-height: 1.7; color: #48627d; }
        .status { margin-top: 16px; font-size: 13px; color: #2d69a5; min-height: 20px; }
        .btn {
            display: inline-block;
            margin-top: 18px;
            padding: 12px 16px;
            border-radius: 10px;
            background: #4A90D9;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>正在刷新背单词缓存</h1>
        <p>这个页面会清除旧缓存并重新载入最新版页面。完成后会自动跳转。</p>
        <div class="status" id="status">正在清理缓存...</div>
        <a class="btn" href="./">如果没有自动跳转，点这里返回首页</a>
    </div>

    <script>
        async function resetApp() {
            const status = document.getElementById('status');

            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(registrations.map(registration => registration.unregister()));
                }

                if ('caches' in window) {
                    const names = await caches.keys();
                    await Promise.all(names.map(name => caches.delete(name)));
                }

                localStorage.removeItem('wordAppState');
                localStorage.removeItem('wordBooksCache');
                localStorage.removeItem('wordBooksCache:v2');
                localStorage.removeItem('wordBooksCache:v3');

                status.textContent = '缓存已清除，正在打开最新版...';
            } catch (error) {
                console.error('重置缓存失败:', error);
                status.textContent = '自动清理失败，请返回首页后手动刷新。';
            }

            setTimeout(() => {
                location.replace('./?fresh=' + Date.now());
            }, 1200);
        }

        resetApp();
    </script>
</body>
</html>
