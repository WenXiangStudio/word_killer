<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#4A90D9">
    <title>背单词</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { color: #4A90D9; font-size: 24px; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: #4A90D9; color: white; }
        .btn-secondary { background: #f0f0f0; color: #333; }
        .btn-success { background: #5cb85c; color: white; }
        .btn-orange { background: #FF9500; color: white; }
        .btn-danger { background: #d9534f; color: white; }
        .btn:disabled { opacity: 0.5; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        .word-display { text-align: center; padding: 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; color: white; margin-bottom: 20px; }
        .word-display h2 { font-size: 32px; margin-bottom: 10px; }
        .word-display .phonetic { font-size: 18px; opacity: 0.9; margin-top: 5px; }
        .mode-switch { display: flex; gap: 10px; margin-bottom: 15px; }
        .mode-switch button { flex: 1; padding: 10px; border: none; border-radius: 8px; background: #f0f0f0; cursor: pointer; }
        .mode-switch button.active { background: #4A90D9; color: white; }
        .choice-btn { background: white; border: 2px solid #e0e0e0; color: #333; }
        .choice-btn:hover { border-color: #4A90D9; }
        .progress { display: flex; justify-content: space-between; font-size: 14px; color: #666; margin-bottom: 15px; }
        .result { text-align: center; }
        .result h2 { color: #4A90D9; font-size: 28px; margin-bottom: 20px; }
        .stat { font-size: 48px; color: #5cb85c; margin: 20px 0; }
        .wrong-word { padding: 10px; background: #fff3f3; border-left: 3px solid #d9534f; margin-bottom: 8px; font-size: 14px; }
        .hidden { display: none !important; }
        .file-info { text-align: center; color: #666; margin: 10px 0; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .loading-spinner { font-size: 32px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .list-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .list-item { background: white; border: 2px solid #e0e0e0; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; }
        .list-item:hover { border-color: #4A90D9; }
        .list-item .list-num { font-size: 18px; font-weight: bold; color: #4A90D9; }
        .list-item .list-count { font-size: 12px; color: #999; margin-top: 5px; }
        .preview-word { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; }
        .preview-word:last-child { border-bottom: none; }
        .preview-word .pw-en { font-size: 16px; font-weight: 500; color: #333; }
        .preview-word .pw-phonetic { font-size: 13px; color: #888; margin-top: 2px; }
        .preview-word .pw-cn { font-size: 14px; color: #666; text-align: right; max-width: 60%; }
        .speak-btn { background: #4A90D9; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer; margin-left: 10px; }
        .speak-btn:hover { background: #357abd; }
        .word-header { display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 设置页 -->
        <div id="setup-page">
            <div class="header"><h1>📚 背单词</h1></div>
            
            <div id="loading-area" class="loading">
                <div class="loading-spinner">⏳</div>
                <p style="margin-top:10px;">正在加载词书...</p>
            </div>

            <div id="book-selection" class="hidden">
                <div class="card">
                    <label>📖 选择词书</label>
                    <div style="display:flex;gap:10px;margin-bottom:15px;">
                        <button class="btn btn-primary" onclick="selectBook('cet4')" id="btn-cet4" style="flex:1;">四级词汇</button>
                        <button class="btn btn-secondary" onclick="selectBook('cet6')" id="btn-cet6" style="flex:1;">六级词汇</button>
                        <button class="btn btn-secondary" onclick="selectBook('kaoyan')" id="btn-kaoyan" style="flex:1;">考研词汇</button>
                    </div>
                    <div id="book-info" style="text-align:center;color:#666;font-size:14px;">请选择词书</div>
                </div>

                <div class="card">
                    <label>📤 或导入自定义词书（TXT文件）</label>
                    <input type="file" id="file-input" accept=".txt,.xlsx,.xls" style="display:none">
                    <button class="btn btn-secondary" onclick="document.getElementById('file-input').click()">选择文件</button>
                    <div id="file-info" class="file-info"></div>
                </div>

                <div class="card">
                    <label>🔢 每个List词数</label>
                    <input type="number" id="words-per-list" value="50" min="5" max="200">
                    <div id="list-count" style="text-align:center;color:#666;margin:10px 0;">将分为 0 个List</div>
                </div>

                <button class="btn btn-success" onclick="showListSelection()">🚀 开始学习</button>
                <button class="btn btn-orange" onclick="continueLearning()">📌 继续上次</button>
            </div>
        </div>

        <!-- List选择页 -->
        <div id="list-page" class="hidden">
            <div class="header"><h1>📋 选择List</h1></div>
            <div class="card">
                <div id="list-grid" class="list-grid"></div>
            </div>
            <button class="btn btn-secondary" onclick="showSetup()">返回</button>
        </div>

        <!-- List预览页 -->
        <div id="preview-page" class="hidden">
            <div class="header"><h1 id="preview-title">List 1</h1></div>
            <div class="card" id="preview-words" style="max-height: 60vh; overflow-y: auto;"></div>
            <button class="btn btn-success" onclick="startListLearning()">🚀 开始背诵</button>
            <button class="btn btn-secondary" onclick="showListSelection()">返回</button>
        </div>

        <!-- 学习页 -->
        <div id="learn-page" class="hidden">
            <div class="progress">
                <span id="list-progress">List 1/1</span>
                <span id="word-progress">1/50</span>
                <span id="score-display">正确: 0</span>
            </div>
            <div class="word-display">
                <div class="word-header">
                    <h2 id="word-text">word</h2>
                    <button class="speak-btn" onclick="speakWord()">🔊</button>
                </div>
                <div class="phonetic" id="word-phonetic">/phonetic/</div>
            </div>
            <div class="mode-switch">
                <button id="mode-select" onclick="switchMode('select')">选择题</button>
                <button id="mode-input" onclick="switchMode('input')">输入</button>
            </div>
            <div id="choices-area"></div>
            <div id="input-area" class="hidden">
                <input type="text" id="answer-input" placeholder="输入中文意思" autocomplete="off">
                <button class="btn btn-success" onclick="checkInput()">确认</button>
            </div>
            <div id="feedback-area"></div>
            <button class="btn btn-secondary" onclick="showSetup()">返回</button>
        </div>

        <!-- 结果页 -->
        <div id="result-page" class="hidden">
            <div class="card result">
                <h2>🎉 学习完成</h2>
                <div class="stat" id="accuracy">0%</div>
                <p id="score-text">正确: 0  错误: 0</p>
            </div>
            <div class="card">
                <h3>📝 错词本</h3>
                <div id="wrong-words-list"></div>
            </div>
            <button class="btn btn-primary" onclick="showSetup()">重新开始</button>
            <button class="btn btn-orange" onclick="reviewWrongWords()">复习错词</button>
        </div>
    </div>

    <script>
        let app = {
            words: [],
            allLists: [],
            currentListIdx: 0,
            currentWordIdx: 0,
            wordsPerList: 50,
            mode: 'select',
            score: 0,
            wrongWords: [],
            showAnswer: false,
            wordBooks: null,
            selectedListIdx: 0
        };

        let currentBookKey = 'cet4';

        async function loadWordBooks() {
            const cached = localStorage.getItem('wordBooksCache');
            if (cached) {
                try {
                    app.wordBooks = JSON.parse(cached);
                    console.log('从缓存加载词书');
                    showBookSelection();
                    return;
                } catch (e) {
                    console.error('缓存解析失败');
                }
            }

            try {
                const response = await fetch('word_books.json');
                app.wordBooks = await response.json();
                localStorage.setItem('wordBooksCache', JSON.stringify(app.wordBooks));
                console.log('从网络加载词书并缓存');
                showBookSelection();
            } catch (error) {
                console.error('加载词书失败:', error);
                document.getElementById('loading-area').innerHTML = '<p style="color:#d9534f;">加载词书失败，请刷新重试</p>';
            }
        }

        function showBookSelection() {
            document.getElementById('loading-area').classList.add('hidden');
            document.getElementById('book-selection').classList.remove('hidden');
            selectBook('cet4');
        }

        function updateListCount() {
            const count = Math.ceil(app.words.length / app.wordsPerList) || 0;
            document.getElementById('list-count').textContent = `将分为 ${count} 个List`;
            app.wordsPerList = parseInt(document.getElementById('words-per-list').value) || 50;
        }

        document.getElementById('words-per-list').addEventListener('input', updateListCount);

        document.getElementById('file-input').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            app.words = [];
            if (ext === 'txt') {
                const text = await file.text();
                text.split('\n').forEach(line => {
                    line = line.trim();
                    if (line) {
                        const parts = line.split(/[\t,]/);
                        if (parts.length >= 2) {
                            app.words.push({word: parts[0].trim(), meaning: parts[1].trim()});
                        }
                    }
                });
            }
            document.getElementById('file-info').textContent = `已加载 ${app.words.length} 个单词`;
            updateListCount();
        });

        function selectBook(bookKey) {
            currentBookKey = bookKey;
            if (!app.wordBooks || !app.wordBooks[bookKey]) return;
            app.words = [...app.wordBooks[bookKey]];
            
            ['cet4', 'cet6', 'kaoyan'].forEach(key => {
                const btn = document.getElementById('btn-' + key);
                if (key === bookKey) {
                    btn.className = 'btn btn-primary';
                    btn.style.flex = '1';
                } else {
                    btn.className = 'btn btn-secondary';
                    btn.style.flex = '1';
                }
            });
            
            const bookNames = {cet4: '四级词汇', cet6: '六级词汇', kaoyan: '考研词汇'};
            document.getElementById('book-info').textContent = `已选择：${bookNames[bookKey]}（${app.words.length}词）`;
            document.getElementById('file-info').textContent = '';
            updateListCount();
        }

        function splitToLists() {
            app.allLists = [];
            for (let i = 0; i < app.words.length; i += app.wordsPerList) {
                app.allLists.push(app.words.slice(i, i + app.wordsPerList));
            }
        }

        function showListSelection() {
            if (app.words.length === 0) {
                alert('请先选择或导入词书');
                return;
            }
            app.wordsPerList = parseInt(document.getElementById('words-per-list').value) || 50;
            splitToLists();
            
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('list-page').classList.remove('hidden');
            
            const grid = document.getElementById('list-grid');
            grid.innerHTML = '';
            app.allLists.forEach((list, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `<div class="list-num">List ${idx + 1}</div><div class="list-count">${list.length}词</div>`;
                div.onclick = () => showListPreview(idx);
                grid.appendChild(div);
            });
        }

        async function showListPreview(listIdx) {
            app.selectedListIdx = listIdx;
            const list = app.allLists[listIdx];
            
            document.getElementById('list-page').classList.add('hidden');
            document.getElementById('preview-page').classList.remove('hidden');
            document.getElementById('preview-title').textContent = `List ${listIdx + 1} 预览`;
            
            const container = document.getElementById('preview-words');
            container.innerHTML = '';
            
            // 先显示单词，不带音标
            list.forEach(word => {
                const div = document.createElement('div');
                div.className = 'preview-word';
                div.id = `pw-${word.word}`;
                div.innerHTML = `
                    <div>
                        <div class="pw-en">${word.word}</div>
                        <div class="pw-phonetic" id="ph-${word.word}">${word.phonetic || '...'}</div>
                    </div>
                    <div class="pw-cn">${word.meaning}</div>
                `;
                container.appendChild(div);
            });
            
            // 后台异步加载音标
            for (const word of list) {
                if (!word.phonetic) {
                    const phonetic = await fetchPhonetic(word.word);
                    const phEl = document.getElementById(`ph-${word.word}`);
                    if (phEl && phonetic) {
                        phEl.textContent = phonetic;
                    } else if (phEl) {
                        phEl.textContent = '';
                    }
                }
            }
        }

        function startListLearning() {
            app.currentListIdx = app.selectedListIdx;
            app.currentWordIdx = 0;
            app.score = 0;
            app.wrongWords = [];
            localStorage.setItem('wordAppState', JSON.stringify({
                words: app.words,
                wordsPerList: app.wordsPerList,
                currentBook: currentBookKey,
                currentListIdx: app.currentListIdx
            }));
            showLearnPage();
        }

        function continueLearning() {
            const saved = localStorage.getItem('wordAppState');
            if (saved) {
                const state = JSON.parse(saved);
                app.words = state.words;
                app.wordsPerList = state.wordsPerList || 50;
                currentBookKey = state.currentBook || 'cet4';
                app.currentListIdx = state.currentListIdx || 0;
                if (app.wordBooks && app.wordBooks[currentBookKey]) {
                    selectBook(currentBookKey);
                }
                splitToLists();
                app.currentWordIdx = 0;
                app.score = 0;
                app.wrongWords = [];
                showLearnPage();
            } else {
                alert('没有可继续的学习记录');
            }
        }

        function showLearnPage() {
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('list-page').classList.add('hidden');
            document.getElementById('preview-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('learn-page').classList.remove('hidden');
            showWord();
        }

        function showSetup() {
            document.getElementById('learn-page').classList.add('hidden');
            document.getElementById('list-page').classList.add('hidden');
            document.getElementById('preview-page').classList.add('hidden');
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('setup-page').classList.remove('hidden');
        }

        async function showWord() {
            if (app.currentListIdx >= app.allLists.length) {
                showResult();
                return;
            }
            const list = app.allLists[app.currentListIdx];
            if (app.currentWordIdx >= list.length) {
                app.currentListIdx++;
                app.currentWordIdx = 0;
                if (app.currentListIdx >= app.allLists.length) {
                    showResult();
                    return;
                }
            }
            const word = app.allLists[app.currentListIdx][app.currentWordIdx];
            document.getElementById('list-progress').textContent = `List ${app.currentListIdx + 1}/${app.allLists.length}`;
            document.getElementById('word-progress').textContent = `${app.currentWordIdx + 1}/${app.allLists[app.currentListIdx].length}`;
            document.getElementById('score-display').textContent = `正确: ${app.score}`;
            document.getElementById('word-text').textContent = word.word;
            
            // 自动获取音标
            let phonetic = word.phonetic || '';
            if (!phonetic) {
                phonetic = await fetchPhonetic(word.word);
            }
            document.getElementById('word-phonetic').textContent = phonetic;
            
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('answer-input').value = '';
            if (app.mode === 'select') {
                document.getElementById('choices-area').classList.remove('hidden');
                document.getElementById('input-area').classList.add('hidden');
                showChoices(word);
            } else {
                document.getElementById('choices-area').classList.add('hidden');
                document.getElementById('input-area').classList.remove('hidden');
            }
            updateModeButtons();
        }

        // 音标缓存
        let phoneticCache = {};

        // 获取音标（使用有道词典API）
        async function fetchPhonetic(word) {
            if (phoneticCache[word]) {
                return phoneticCache[word];
            }
            
            // 尝试有道词典API
            try {
                const response = await fetch(`https://dict.youdao.com/jsonapi?q=${encodeURIComponent(word)}&le=eng&dicts={"count":1,"dicts":[["ec"]]}`);
                const data = await response.json();
                if (data && data.ec && data.ec.word && data.ec.word[0]) {
                    const w = data.ec.word[0];
                    const usphone = w.usphone || w.phone;
                    if (usphone) {
                        phoneticCache[word] = `/${usphone}/`;
                        return `/${usphone}/`;
                    }
                }
            } catch (e) {
                console.log('有道API失败，尝试备用API');
            }
            
            // 备用：Free Dictionary API
            try {
                const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                const data = await response.json();
                if (data && data[0] && data[0].phonetics) {
                    for (const p of data[0].phonetics) {
                        if (p.text) {
                            phoneticCache[word] = p.text;
                            return p.text;
                        }
                    }
                }
            } catch (e) {
                console.log('备用API也失败');
            }
            
            return '';
        }

        // 高质量TTS（使用Google Translate）
        function speakWord() {
            const word = app.allLists[app.currentListIdx][app.currentWordIdx];
            const audio = new Audio();
            audio.src = `https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(word.word)}&tl=en&client=twob`;
            audio.play().catch(e => {
                // 降级到浏览器原生TTS
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(word.word);
                    utterance.lang = 'en-US';
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function updateModeButtons() {
            document.getElementById('mode-select').classList.toggle('active', app.mode === 'select');
            document.getElementById('mode-input').classList.toggle('active', app.mode === 'input');
        }

        function switchMode(mode) {
            app.mode = mode;
            showWord();
        }

        function showChoices(word) {
            const container = document.getElementById('choices-area');
            container.innerHTML = '';
            const choices = generateChoices(word);
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'btn choice-btn';
                btn.textContent = choice;
                btn.onclick = () => checkChoice(choice, word);
                container.appendChild(btn);
            });
        }

        function generateChoices(word) {
            const choices = [word.meaning];
            const otherMeanings = app.words.filter(w => w.meaning !== word.meaning).map(w => w.meaning);
            while (choices.length < 5 && otherMeanings.length > 0) {
                const idx = Math.floor(Math.random() * otherMeanings.length);
                const m = otherMeanings.splice(idx, 1)[0];
                if (!choices.includes(m)) choices.push(m);
            }
            return choices.sort(() => Math.random() - 0.5);
        }

        function checkChoice(choice, word) {
            const feedback = document.getElementById('feedback-area');
            if (choice === word.meaning) {
                app.score++;
                app.currentWordIdx++;
                feedback.innerHTML = '<p style="color:#5cb85c;font-size:18px;">✓ 正确！</p>';
                setTimeout(showWord, 800);
            } else {
                app.wrongWords.push(word);
                feedback.innerHTML = `<p style="color:#d9534f;font-size:16px;">✗ 错误！正确意思：${word.meaning}</p><button class="btn btn-secondary" onclick="nextWord()">下一个</button>`;
            }
        }

        function checkInput() {
            const input = document.getElementById('answer-input').value.trim();
            const word = app.allLists[app.currentListIdx][app.currentWordIdx];
            const feedback = document.getElementById('feedback-area');

            const isCorrect = validateAnswer(input, word.meaning);

            if (isCorrect) {
                app.score++;
                app.currentWordIdx++;
                feedback.innerHTML = '<p style="color:#5cb85c;font-size:18px;">✓ 正确！</p>';
                setTimeout(showWord, 800);
            } else {
                app.wrongWords.push(word);
                feedback.innerHTML = `<p style="color:#d9534f;font-size:16px;">✗ 错误！正确意思：${word.meaning}</p><button class="btn btn-secondary" onclick="nextWord()">下一个</button>`;
            }
        }

        function validateAnswer(userInput, correctMeaning) {
            if (!userInput) return false;

            // 清理答案：去除 n. v. adj. adv. 等前缀
            const cleanAnswer = (str) => str.replace(/^[nva]\.(\s*)/, '').trim();

            const answers = correctMeaning.split(/[，,、;；]/)
                .map(a => cleanAnswer(a))
                .filter(a => a);
            const inputs = userInput.split(/[，,、;；]/)
                .map(a => a.trim())
                .filter(a => a);

            if (inputs.length === 0) return false;

            if (inputs.length === 1) {
                return answers.some(a => a === inputs[0]);
            }

            return inputs.every(input => answers.includes(input));
        }

        function nextWord() {
            app.currentWordIdx++;
            showWord();
        }

        function showResult() {
            document.getElementById('learn-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            const total = app.score + app.wrongWords.length;
            const accuracy = total > 0 ? ((app.score / total) * 100).toFixed(1) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
            document.getElementById('score-text').textContent = `正确: ${app.score}  错误: ${app.wrongWords.length}`;
            const list = document.getElementById('wrong-words-list');
            list.innerHTML = '';
            app.wrongWords.slice(0, 20).forEach(w => {
                const div = document.createElement('div');
                div.className = 'wrong-word';
                div.textContent = `${w.word} - ${w.meaning}`;
                list.appendChild(div);
            });
            if (app.wrongWords.length === 0) {
                list.innerHTML = '<p style="color:#5cb85c;text-align:center;padding:20px;">太棒了，全部正确！🎉</p>';
            }
        }

        function reviewWrongWords() {
            if (app.wrongWords.length === 0) return;
            app.words = app.wrongWords;
            app.wrongWords = [];
            splitToLists();
            app.currentListIdx = 0;
            app.currentWordIdx = 0;
            app.score = 0;
            showLearnPage();
        }

        window.addEventListener('load', loadWordBooks);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
